<section class="page">
  @if (request) {
    <h1>{{ request.title }}</h1>
    <p>{{ request.description }}</p>
    <dl>
      <dt>Status</dt>
      <dd>{{ request.status }}</dd>
      <dt>Sponsor</dt>
      <dd>{{ request.sponsorName }}</dd>
      <dt>Requested amount</dt>
      <dd>{{ request.requestedAmount }} {{ request.currencyCode }}</dd>
    </dl>
  } @else {
    <p>Loading request...</p>
  }
</section>
