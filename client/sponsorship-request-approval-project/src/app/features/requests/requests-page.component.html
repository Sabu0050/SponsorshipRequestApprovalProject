<section class="page">
  <h1>Sponsorship Requests</h1>

  @if (requests?.items?.length) {
    <ul>
      @for (request of requests?.items; track request.id) {
        <li>
          <a [routerLink]="[request.id]">{{ request.requestNumber }} - {{ request.title }}</a>
          <span>{{ request.status }}</span>
        </li>
      }
    </ul>
  } @else {
    <p>No sponsorship requests found.</p>
  }
</section>
