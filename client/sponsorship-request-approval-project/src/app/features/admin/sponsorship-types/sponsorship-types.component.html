<section class="page">
  <h2>Sponsorship Types</h2>
  <div class="panel">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Active</th></tr></thead>
        <tbody>
          @for (item of items; track item.id) {
            <tr><td>{{ item.name }}</td><td>{{ item.isActive ? 'Yes' : 'No' }}</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
