<section class="page">
  <h1>Approvals</h1>

  @if (approvals?.items?.length) {
    <ul>
      @for (request of approvals?.items; track request.id) {
        <li>{{ request.requestNumber }} - {{ request.title }} - {{ request.status }}</li>
      }
    </ul>
  } @else {
    <p>No approvals assigned.</p>
  }
</section>
